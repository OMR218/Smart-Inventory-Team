services:
  mongo:
    image: mongo:7
    container_name: inventory-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./db/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js

  auth-service:
    build: ./auth-service
    environment:
      PORT: 4001
      MONGO_URI: mongodb://mongo:27017/auth_db
      ADMIN_NAME: Admin User
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    depends_on:
      - mongo
    ports:
      - "4001:4001"

  product-service:
    build: ./product-service
    environment:
      PORT: 4002
      MONGO_URI: mongodb://mongo:27017/product_db
    depends_on:
      - mongo
    ports:
      - "4002:4002"

  api-gateway:
    build: ./api-gateway
    environment:
      PORT: 8080
      AUTH_SERVICE_URL: http://auth-service:4001
      PRODUCT_SERVICE_URL: http://product-service:4002
    depends_on:
      - auth-service
      - product-service
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8081
    depends_on:
      - api-gateway
    ports:
      - "3000:80"

volumes:
  mongo-data:
